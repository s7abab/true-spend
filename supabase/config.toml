# Supabase CLI — https://supabase.com/docs/guides/cli/config
# Match [db].major_version to your hosted DB (Dashboard → Database → Postgres version).
# Then: supabase login && supabase link --project-ref <ref> && npm run db:push

project_id = "truspend"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"

[storage]
enabled = true
